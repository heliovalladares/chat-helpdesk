<!DOCTYPE html>
<html lang="pt-br">
<head>
  <title>Chat Help Desk</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
  <link rel="icon" href="img/favicon.ico" type="image/x-icon">
</head>
<body>

<div class="container">
  <h2 id="artext"> Chat Help Desk</h2>
  <div class="chat_window">
    
    <ul class="messages" id="messages">
      <li class="message left">
        <div class="avatar bot"></div>
        <div class="text_wrapper">Olá! Qual a sua dúvida hoje? Por favor, <b>selecione uma categoria nos botões abaixo</b> para começarmos.</div>
      </li>
    </ul>
<div class="quick_replies" id="quick_replies" style="display: flex; gap: 8px; padding: 10px; background: #222; border-top: 1px solid #333; flex-wrap: wrap;">
  <button class="quick_btn" data-categoria="cima"> <ion-icon name="logo-tux"></ion-icon> CIMA</ion-icon>
  <button class="quick_btn" data-categoria="gunnebo"> <ion-icon name="logo-windows"></ion-icon> Gunnebo</button>
  <button class="quick_btn" data-categoria="cashlogy"> <ion-icon name="logo-windows"></ion-icon> CashLogy</button>
  <button class="quick_btn" data-categoria="diebold"> <ion-icon name="logo-windows"></ion-icon> Diebold</button>
</div>

    <div class="bottom_wrapper">
      <input id="msg_input" placeholder="Digite sua dúvida..." />
      <button id="send_button" class="btn btn-primary">Enviar</button>
    </div>

    <div style="padding: 5px 15px 15px 15px; background-color: #1a1a1a; text-align: center;">
      <button id="reset_chat_btn" class="btn btn-danger btn-sm" style="width: 100%; border-radius: 20px; font-weight: bold;">
        <i class="fa fa-refresh"></i>  Mudar Categoria / Nova Conversa
      </button>
    </div>

  </div>
</div>

<script src="https://code.jquery.com/jquery-2.2.4.min.js"></script>
<script src="js/matcher.js.js"></script>
<script src="js/chat.js.js"></script>
<script type="module" src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.js"></script>


</body>
</html>
